# Portable root config (works with both pre-commit and prek)
# - Keep this file small ("thin root").
# - Put language-specific hooks in per-subproject configs (workspace mode) or use files: scoping.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-added-large-files
        args: ["--maxkb=1024"]
  - repo: local
    hooks:
      - id: shfmt
        name: shfmt
        entry: shfmt -w -i 2 -ci
        language: system
        files: '(^|/)([^/]+\.sh|safari|pre-commit)$'
      - id: shellcheck
        name: shellcheck
        entry: shellcheck -x
        language: system
        files: '(^|/)([^/]+\.sh|safari|pre-commit)$'
      - id: make-check
        name: make check
        entry: make check
        language: system
        pass_filenames: false
        always_run: true
